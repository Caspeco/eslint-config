name: Build and test
on:
  pull_request:
    branches: ["main"]

concurrency:
  group: code-check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version-file: "package.json"

      - name: Install Dependencies
        run: npm ci
        env:
          GPR_PRIVATE_READ_TOKEN: ${{ secrets.GPR_PRIVATE_READ_TOKEN }}

      - name: Build packages
        run: npm run build

      - name: Tests
        run: npm run ci-test

      - name: Check types
        run: npm run tsc

      - name: Check published types
        run: npm run check:types

      - name: Formatting
        run: npm run prettier:check

      - name: Verify package.json sort order to avoid unnecessary diffs
        run: npm run verify-package-sort-order

      - name: Security audit
        run: npm audit --audit-level=moderate
